# CI: roda a suíte de testes a cada push/PR. Se falhar, NÃO faça deploy —
# o isolamento por usuário é testado aqui e é a garantia mais crítica.
name: Testes

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependências
        run: pip install -r requirements-dev.txt
      - name: Rodar testes
        run: python -m pytest tests/ -v
