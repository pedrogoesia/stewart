<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#A3212B">
  <title>{% block title %}Stewart — Relatórios de Obras{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Stewart" class="brand-logo">
      <span class="brand-text">Relatórios de Obras</span>
    </a>
    {% if current_user.is_authenticated %}
    <nav class="user-menu">
      {% if current_user.is_admin %}
      <a class="user-link" href="{{ url_for('admin_usuarios') }}">Usuários</a>
      {% endif %}
      <a class="user-link" href="{{ url_for('conta') }}">Minha conta</a>
      <span class="user-email" title="{{ current_user.email }}">{{ current_user.email }}</span>
      <a class="btn btn-sm btn-ghost" href="{{ url_for('logout') }}">Sair</a>
    </nav>
    {% endif %}
    {% block topbar_extra %}{% endblock %}
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
