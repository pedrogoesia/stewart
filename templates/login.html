{% extends "base.html" %}
{% block title %}Entrar — Stewart{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Entrar</h1>
    <p class="muted">Acesse com seu email e senha para ver suas obras.</p>

    {% if erro %}<p class="auth-erro">⚠️ {{ erro }}</p>{% endif %}

    <form method="post"
          action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Email
        <input type="email" name="email" required autofocus autocomplete="username">
      </label>
      <label>Senha
        <input type="password" name="senha" required autocomplete="current-password">
      </label>
      <button class="btn btn-primary auth-submit" type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
