{% extends "base.html" %}
{% block title %}Entrar — Stewart{% endblock %}

{% block content %}
<!-- Fundo em vídeo (decorativo): mudo, em loop e sem áudio para tocar sozinho
     também no celular. O poster pinta a tela na hora enquanto o vídeo baixa. -->
<div class="login-bg" aria-hidden="true">
  <video autoplay muted loop playsinline preload="auto"
         poster="{{ asset('video/login-bg.jpg') }}">
    <source src="{{ asset('video/login-bg.mp4') }}" type="video/mp4">
  </video>
</div>

<div class="auth-wrap login-wrap">
  <div class="auth-card login-card">
    <img class="login-logo" src="{{ url_for('static', filename='img/logo.png') }}" alt="Stewart Engenharia">
    <h1>Entrar</h1>
    <p class="muted">Acesse com seu email e senha para ver suas obras.</p>

    {% if erro %}<p class="auth-erro">⚠️ {{ erro }}</p>{% endif %}

    <form method="post"
          action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Email
        <input type="email" name="email" required autofocus autocomplete="username">
      </label>
      <label>Senha
        <input type="password" name="senha" required autocomplete="current-password">
      </label>
      <button class="btn btn-primary auth-submit" type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
